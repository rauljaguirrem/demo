apiVersion: apps/v1
kind: Deployment
metadata:
  name: webflux-demo

spec:
  replicas: 2

  selector:
    matchLabels:
      app: webflux-demo

  template:
    metadata:
      labels:
        app: webflux-demo

    spec:
      containers:
        - name: webflux-demo

          image: raul/webflux-demo:1.0

          imagePullPolicy: Always

          ports:
            - containerPort: 8080

          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"

            limits:
              memory: "512Mi"
              cpu: "500m"